name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Matches the style used across this repo: feat, fix, refactor, docs, chore, etc.
          types: |
            feat
            fix
            refactor
            docs
            chore
            test
            perf
            ci
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title's subject (after "type:") should start with a
            lowercase letter, e.g. "refactor: split page.tsx into components"
            
